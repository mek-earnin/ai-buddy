<svg width="600" height="600" viewBox="212 212 600 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Monochrome menu-bar template: black mark on transparent, cropped tight so
       it fills the menu bar (macOS scales the PNG to bar height). ~7% padding.
       macOS recolors via the alpha channel for light/dark bars. -->
  <circle cx="512" cy="512" r="210" fill="none" stroke="#000000" stroke-width="100"
          stroke-linecap="round" stroke-dasharray="989.6 329.9"/>
  <circle cx="512" cy="512" r="104" fill="#000000"/>
  <circle cx="664" cy="360" r="86" fill="#000000"/>
</svg>
